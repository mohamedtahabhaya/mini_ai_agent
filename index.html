<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background: white; width: 100%; max-width: 500px; height: 80vh; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; }
        .message.user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.bot { background: #e9ecef; color: black; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap;}
        .loading { font-style: italic; color: #6c757d; font-size: 0.9em; align-self: flex-start; display: none; }
        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid #dee2e6; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ced4da; border-radius: 20px; outline: none; font-size: 1em; }
        button { background: #007bff; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 AI Agent Custom</div>
    <div class="chat-messages" id="chat-messages">
        <div class="message bot">Hi ! Ask me a question.</div>
        <div class="loading" id="loading">Thinking...</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Write your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const messageText = inputField.value.trim();
        if (!messageText) return;

        addMessage(messageText, "user");
        inputField.value = "";

        document.getElementById("loading").style.display = "block";
        scrollToBottom();

        try {
            const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: messageText,
                    session_id: "demo_web_2" 
                })
            });

            const data = await response.json();

            document.getElementById("loading").style.display = "none";
            addMessage(data.reponse, "bot");

        } catch (error) {
            document.getElementById("loading").style.display = "none";
            addMessage("Erreur : Impossible de se connecter à l'API. Le serveur est-il lancé ?", "bot");
            console.error("Erreur Fetch:", error);
        }
    }

    function addMessage(text, sender) {
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", sender);
        messageDiv.textContent = text;
        
        const chatMessages = document.getElementById("chat-messages");
        const loadingDiv = document.getElementById("loading");
        
        chatMessages.insertBefore(messageDiv, loadingDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        const chatMessages = document.getElementById("chat-messages");
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") { sendMessage(); }
    }
</script>

</body>
</html>
